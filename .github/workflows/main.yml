name: Release Packer

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Filename set to NoMoreTabs.zip
          ZIP_NAME="NoMoreTabs.zip"
          
          # Determine the TAG_NAME
          TAG_NAME=${{ github.event.release.tag_name }}
          if [ -z "$TAG_NAME" ]; then
            git fetch --tags
            TAG_NAME=$(git tag --sort=-v:refname | head -n 1 || echo "v1.0")
          fi

          echo "Target Tag: $TAG_NAME"

          # Ensure the release exists before uploading
          gh release view "$TAG_NAME" > /dev/null 2>&1 || gh release create "$TAG_NAME" --title "Release $TAG_NAME" --notes "Auto-generated release"

          # Create the zip package
          zip -r "$ZIP_NAME" . -x "LICENSE" "README.md" ".git*" ".github*"
          
          # Upload asset to the determined tag
          gh release upload "$TAG_NAME" "$ZIP_NAME" --clobber
          
          # Output the permanent 'latest' download link
          echo "Download URL: https://github.com/${{ github.repository }}/releases/latest/download/$ZIP_NAME"

      - name: Update latest branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch --tags
          TAG_NAME=$(git tag --sort=-v:refname | head -n 1 || echo "v1.0")
          
          git checkout latest 2>/dev/null || git checkout -b latest
          git reset --hard "$TAG_NAME"
          git push origin latest --force
