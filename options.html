<!DOCTYPE html>
<html>
<head>
    <title>NoMoreTabs Settings</title>
    <style>
        body { font-family: "Segoe UI", sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        h1 { border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        ul { list-style: none; padding: 0; }
        li { background: #f3f4f6; margin-bottom: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
        .delete-btn { background: #dc2626; font-size: 12px; }
        .delete-btn:hover { background: #b91c1c; }
    </style>
</head>
<body>
    <h1>NoMoreTabs - Blocked Domains</h1>
    <p>Websites listed here will be blocked silently.</p>
    
    <div class="input-group">
        <input type="text" id="new-host" placeholder="example.com">
        <button id="add-btn">Add Domain</button>
    </div>

    <ul id="list"></ul>
    <script src="options.js"></script>
</body>
</html>
