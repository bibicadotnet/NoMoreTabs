<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 360px;
      background: #f8fafc;
      color: #1e293b;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      background: #1e293b;
      color: #fff;
    }

    .header img {
      width: 20px;
      height: 20px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 700;
    }

    .quick {
      padding: 12px 16px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .quick button {
      display: none;
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      text-align: left;
    }

    #quick-popup-block {
      background: #fee2e2;
      color: #b91c1c;
    }

    #quick-popup-allow {
      background: #dcfce7;
      color: #15803d;
    }

    .quick button:hover {
      filter: brightness(0.95);
    }

    .section {
      border-bottom: 1px solid #e2e8f0;
    }

    .section:last-of-type {
      border-bottom: none;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
    }

    .section-header:hover {
      background: #f1f5f9;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #64748b;
    }

    .section-meta {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-count {
      font-size: 10px;
      font-weight: 700;
      background: #e2e8f0;
      color: #64748b;
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    .count-red { background: #fee2e2; color: #dc2626; }
    .count-green { background: #dcfce7; color: #16a34a; }
    .count-orange { background: #ffedd5; color: #ea580c; }

    .section-arrow {
      font-size: 10px;
      color: #94a3b8;
      transition: transform 0.2s;
    }

    .section.open .section-arrow {
      transform: rotate(180deg);
    }

    .section-body {
      display: none;
      padding: 0 16px 12px;
    }

    .section.open .section-body {
      display: block;
    }

    .add-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .add-row input {
      flex: 1;
      padding: 6px 9px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      background: #fff;
    }

    .add-row input:focus {
      border-color: #94a3b8;
    }

    .add-row button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background: #1e293b;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .add-row button:hover {
      background: #0f172a;
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #e2e8f0;
      color: #334155;
      font-size: 11px;
      padding: 3px 6px 3px 8px;
      border-radius: 12px;
      max-width: 100%;
    }

    .chip-host {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chip-x {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
    }

    .chip-x:hover {
      color: #ef4444;
    }

    .empty-msg {
      font-size: 12px;
      color: #94a3b8;
      padding: 2px 0;
    }

    #toast {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #fff;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 9;
    }

    #toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>

  <div class="header">
    <img src="app_icon_128.png">
    <h1>NoMoreTabs</h1>
  </div>

  <div class="quick">
    <button id="quick-popup-block"></button>
    <button id="quick-popup-allow"></button>
  </div>

  <!-- Block popups by SOURCE -->
  <div class="section" id="sec-popup-block">
    <div class="section-header" data-toggle="sec-popup-block">
      <span class="section-title">🚫 Block popups from domain</span>
      <span class="section-meta">
        <span class="section-count count-red" id="count-popup-block">0</span>
        <span class="section-arrow">▼</span>
      </span>
    </div>
    <div class="section-body">
      <div class="add-row">
        <input id="new-popup-block" placeholder="example.com or *.example.com" type="text">
        <button id="add-popup-block-btn">+</button>
      </div>
      <div class="chip-list" id="popup-blocklist"></div>
      <p id="empty-popup-block-msg" class="empty-msg" style="display:none">No domains added yet</p>
    </div>
  </div>

  <!-- Allow popups by SOURCE -->
  <div class="section" id="sec-popup-allow">
    <div class="section-header" data-toggle="sec-popup-allow">
      <span class="section-title">✅ Allow popups from domain</span>
      <span class="section-meta">
        <span class="section-count count-green" id="count-popup-allow">0</span>
        <span class="section-arrow">▼</span>
      </span>
    </div>
    <div class="section-body">
      <div class="add-row">
        <input id="new-popup-allow" placeholder="example.com or *.example.com" type="text">
        <button id="add-popup-allow-btn">+</button>
      </div>
      <div class="chip-list" id="popup-allowlist"></div>
      <p id="empty-popup-allow-msg" class="empty-msg" style="display:none">No domains added yet</p>
    </div>
  </div>

  <!-- Block navigation by DESTINATION -->
  <div class="section" id="sec-nav-block">
    <div class="section-header" data-toggle="sec-nav-block">
      <span class="section-title">🔗 Block navigation to domain</span>
      <span class="section-meta">
        <span class="section-count count-orange" id="count-nav-block">0</span>
        <span class="section-arrow">▼</span>
      </span>
    </div>
    <div class="section-body">
      <div class="add-row">
        <input id="new-nav-block" placeholder="adsite.com or *.adsite.com" type="text">
        <button id="add-nav-block-btn">+</button>
      </div>
      <div class="chip-list" id="nav-blocklist"></div>
      <p id="empty-nav-block-msg" class="empty-msg" style="display:none">No domains added yet</p>
    </div>
  </div>

  <div id="toast"></div>
  <script src="popup.js"></script>
</body>

</html>
